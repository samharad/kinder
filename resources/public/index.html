<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>kinder</title>
<style>
  :root { color-scheme: light; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, system-ui, sans-serif;
    margin: 0;
    padding: 16px;
    background: #fafafa;
    color: #222;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .bar {
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .bar button {
    padding: 6px 12px;
    font: inherit;
    cursor: pointer;
  }
  .bar label { cursor: pointer; }
  .seed {
    margin-left: auto;
    color: #888;
    font-family: ui-monospace, monospace;
    font-size: 12px;
  }
  .viewport {
    flex: 1;
    position: relative;
    overflow: hidden;
    min-height: 0;
    cursor: grab;
    user-select: none;
    touch-action: none;
    background: #f0f0f0;
    border: 1px solid #ddd;
  }
  .viewport.panning { cursor: grabbing; }
  .canvas {
    position: absolute;
    inset: 0;
    transform-origin: 0 0;
    will-change: transform;
  }
  .stage {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .stage svg {
    max-width: 100%;
    max-height: 100%;
    height: auto;
    width: auto;
    display: block;
  }
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #222;
    color: #fff;
    padding: 8px 16px;
    border-radius: 4px;
    font: 12px ui-monospace, monospace;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .view-tabs { display: flex; gap: 4px; }
  .view-tabs button {
    padding: 6px 14px;
    font: inherit;
    cursor: pointer;
    background: #eee;
    border: 1px solid #ddd;
    border-radius: 4px;
  }
  .view-tabs button.active { background: #222; color: #fff; border-color: #222; }
  .view { flex: 1; display: flex; flex-direction: column; gap: 12px; min-height: 0; }
  .view[hidden] { display: none; }
  .gallery {
    flex: 1;
    overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    padding: 4px;
    align-content: start;
  }
  .gallery .tile {
    cursor: zoom-in;
    background: #f0f0f0;
    border: 1px solid #ddd;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    aspect-ratio: 1;
  }
  .gallery .tile img {
    max-width: 100%;
    max-height: 100%;
    display: block;
  }
  .gallery .tile .name {
    position: absolute;
    color: #fff;
    background: rgba(0,0,0,0.4);
    font: 11px ui-monospace, monospace;
    padding: 2px 6px;
    margin-top: -100%;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .gallery .tile:hover .name { opacity: 1; }
  .fullscreen {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    cursor: zoom-out;
  }
  .fullscreen[hidden] { display: none; }
  .fullscreen img {
    max-width: 95vw;
    max-height: 92vh;
    display: block;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }
  .fullscreen .nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: none;
    font-size: 32px;
    padding: 8px 16px;
    cursor: pointer;
    user-select: none;
  }
  .fullscreen .nav:hover { background: rgba(255,255,255,0.3); }
  .fullscreen .prev { left: 16px; }
  .fullscreen .next { right: 16px; }
  .fullscreen .caption {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: #ccc;
    font: 12px ui-monospace, monospace;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="view-tabs">
  <button data-view="generate" class="active" type="button">generate</button>
  <button data-view="inspiration" type="button">inspiration</button>
</div>
<div class="view" id="generate-view">
  <div class="bar">
    <span>mode:</span>
    <label title="A single standalone pane.">
      <input type="radio" name="mode" value="single"> single
    </label>
    <label title="Three independent panes laid out 1:2:1 -- narrow, wide, narrow. Each is generated from its own seed.">
      <input type="radio" name="mode" value="triptych"> triptych (1:2:1)
    </label>
    <label title="Three independent panes of equal width (1:1:1). Each is generated from its own seed.">
      <input type="radio" name="mode" value="triptych-equal"> triptych (1:1:1)
    </label>
    <label title="Three equal-width panes that share a base skeleton, each with localized subtree mutations. Reveals the variation + coordinated-circles controls below.">
      <input type="radio" name="mode" value="triptych-variation" checked> triptych (variation)
    </label>
    <label title="Gap in units between triptych panels. Ignored in single mode.">
      gap: <input type="number" id="gap" value="6" min="0" step="0.5" style="width: 5em;">
    </label>
    <label title="Border (lead) thickness in canvas units. 0.2 ≈ thin pencil line; 0.5+ gives a stained-glass leaded look. Heavier weights make tiny rects merge into solid black.">
      lead: <input type="number" id="stroke-weight" value="0.2" min="0" step="0.05" style="width: 5em;">
    </label>
    <button id="generate" type="button" title="Generate a new image with a fresh random seed. Keyboard: Enter.">generate (enter)</button>
    <button id="save" type="button" title="Save the current image to output/svg/ with a timestamped filename. Keyboard: s.">save (s)</button>
    <button id="reset" type="button" title="Reset pan and zoom on the preview. Keyboard: r or 0. Double-click the preview does the same.">reset view (r)</button>
    <span class="seed" id="seed" title="Current seed and mode. The seed uniquely identifies the image; changing any parameter and regenerating with the same seed is deterministic."></span>
  </div>
  <div class="bar">
    <span>subdivision:</span>
    <label title="Multiplier on the 'stop subdividing' weight across every size branch. 1.0 = current behavior. Lower = denser / fewer empty cream blocks. 0 = never stop voluntarily. Higher = more empty regions. Affects all modes.">
      stop-weight: <input type="number" id="empty-weight-scale" value="1.0" min="0" step="0.1" style="width: 5em;">
    </label>
    <label title="Exponent shaping which divisor an even-split chooses. 1.0 = current behavior (small divisors favored → dense micro-patterns on 1-unit strips). 0 = uniform. Negative = large divisors favored (chunkier splits). Affects all modes.">
      divisor-bias: <input type="number" id="divisor-bias" value="1.0" step="0.25" style="width: 5em;">
    </label>
    <label title="Exponent shaping preference for cutting along the rect's short axis. 1.0 = current behavior (10:1 favors short-axis cuts, so tall panes get horizontal bands). 0 = 50/50. Negative favors long-axis cuts (vertical mullions on tall panes, Frank Lloyd Wright look). Affects all modes.">
      cut-direction-bias: <input type="number" id="cut-direction-bias" value="1.0" step="0.25" style="width: 5em;">
    </label>
  </div>
  <div class="bar" id="variation-params" hidden>
    <span>variation:</span>
    <label title="Subtrees to regenerate per panel. 0 = identical panels; too many = panels drift apart.">
      mutations: <input type="number" id="mutations" value="20" min="0" step="1" style="width: 4em;">
    </label>
    <label title="Shallowest mutation depth. 0 allows the root as a target (panel becomes fully independent from the base if root is picked). 1 excludes the root so mutations are always localized.">
      min-depth: <input type="number" id="min-depth" value="0" min="0" step="1" style="width: 4em;">
    </label>
    <label title="Deepest mutation depth. Smaller values = bigger visible changes; larger = subtler.">
      max-depth: <input type="number" id="max-depth" value="4" min="1" step="1" style="width: 4em;">
    </label>
    <label title="Minimum rect dimension (in units) eligible to mutate. Skips nodes too small to see.">
      min-dim: <input type="number" id="min-dim" value="3" min="1" step="1" style="width: 4em;">
    </label>
  </div>
  <div class="bar" id="coordinated-params" hidden>
    <label title="Replace each panel's independent circles with circles sampled along a shared curve across the whole triptych.">
      <input type="checkbox" id="coordinated-circles" checked> coordinated circles
    </label>
    <label title="Total circles sampled across the triptych (some may land in gaps and be dropped).">
      count: <input type="number" id="circle-count" value="8" min="1" step="1" style="width: 4em;">
    </label>
    <label title="Random wander along the curve, as a fraction of the spacing between adjacent samples.">
      along: <input type="number" id="jitter-along" value="0.3" min="0" step="0.05" style="width: 5em;">
    </label>
    <label title="Random wander perpendicular to the curve, as a fraction of panel height. Negative values permitted (statistically equivalent to positive since jitter is symmetric).">
      perp: <input type="number" id="jitter-perp" value="0.2" step="0.05" style="width: 5em;">
    </label>
    <label title="Sine amplitude as a fraction of panel height. 0 = straight line. Negative values flip the curve direction.">
      amplitude: <input type="number" id="amplitude" value="0.25" step="0.05" style="width: 5em;">
    </label>
    <label title="Sine cycles across the full triptych width.">
      frequency: <input type="number" id="frequency" value="1.0" min="0" step="0.25" style="width: 5em;">
    </label>
    <label title="Dev overlay: draws the underlying curve as a faint dashed line so you can see where circles should be falling.">
      <input type="checkbox" id="show-curve"> show curve
    </label>
  </div>
  <div class="viewport" id="viewport">
    <div class="canvas" id="canvas">
      <div class="stage" id="stage"></div>
    </div>
  </div>
</div>
<div class="view" id="inspiration-view" hidden>
  <div class="gallery" id="gallery"></div>
</div>
<div class="fullscreen" id="fullscreen" hidden>
  <button class="nav prev" type="button" aria-label="previous">‹</button>
  <img id="fullscreen-img" alt="">
  <button class="nav next" type="button" aria-label="next">›</button>
  <div class="caption" id="fullscreen-caption"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const stage = document.getElementById('stage');
const viewport = document.getElementById('viewport');
const canvas = document.getElementById('canvas');
const seedEl = document.getElementById('seed');
const toastEl = document.getElementById('toast');
const gapEl = document.getElementById('gap');
const strokeWeightEl = document.getElementById('stroke-weight');
const variationParamsEl = document.getElementById('variation-params');
const coordinatedParamsEl = document.getElementById('coordinated-params');
const emptyWeightScaleEl = document.getElementById('empty-weight-scale');
const divisorBiasEl = document.getElementById('divisor-bias');
const cutDirectionBiasEl = document.getElementById('cut-direction-bias');
const mutationsEl = document.getElementById('mutations');
const minDepthEl = document.getElementById('min-depth');
const maxDepthEl = document.getElementById('max-depth');
const minDimEl = document.getElementById('min-dim');
const coordinatedEl = document.getElementById('coordinated-circles');
const circleCountEl = document.getElementById('circle-count');
const jitterAlongEl = document.getElementById('jitter-along');
const jitterPerpEl = document.getElementById('jitter-perp');
const amplitudeEl = document.getElementById('amplitude');
const frequencyEl = document.getElementById('frequency');
const showCurveEl = document.getElementById('show-curve');
let state = { seed: null, mode: 'single' };

function currentMode() {
  return document.querySelector('input[name=mode]:checked').value;
}

function currentGap() {
  const v = parseFloat(gapEl.value);
  return isNaN(v) ? 6 : v;
}

function currentStrokeWeight() {
  const v = parseFloat(strokeWeightEl.value);
  return isNaN(v) ? 0.2 : v;
}

function intValue(el, fallback) {
  const v = parseInt(el.value, 10);
  return isNaN(v) ? fallback : v;
}

function floatValue(el, fallback) {
  const v = parseFloat(el.value);
  return isNaN(v) ? fallback : v;
}

function currentSubdivisionParams() {
  return {
    'empty-weight-scale': floatValue(emptyWeightScaleEl, 1.0),
    'divisor-bias': floatValue(divisorBiasEl, 1.0),
    'cut-direction-bias': floatValue(cutDirectionBiasEl, 1.0),
  };
}

function currentVariationParams() {
  return {
    mutations: intValue(mutationsEl, 20),
    'min-depth': intValue(minDepthEl, 0),
    'max-depth': intValue(maxDepthEl, 4),
    'min-dim': intValue(minDimEl, 3),
  };
}

function currentCoordinatedParams() {
  return {
    'coordinated-circles': coordinatedEl.checked,
    'circle-count': intValue(circleCountEl, 8),
    'jitter-along': floatValue(jitterAlongEl, 0.3),
    'jitter-perp': floatValue(jitterPerpEl, 0.2),
    amplitude: floatValue(amplitudeEl, 0.25),
    frequency: floatValue(frequencyEl, 1.0),
    'show-curve': showCurveEl.checked,
  };
}

function syncVariationVisibility() {
  const show = (currentMode() === 'triptych-variation');
  variationParamsEl.hidden = !show;
  coordinatedParamsEl.hidden = !show;
}

// Incremented on every call. Each in-flight request captures its own
// version; responses whose version no longer matches are discarded so a
// slow earlier response can't clobber a newer one's stage content.
let generateVersion = 0;

async function generate({ reuseSeed = false } = {}) {
  const v = ++generateVersion;
  const mode = currentMode();
  const url = new URL('/generate', window.location.origin);
  url.searchParams.set('mode', mode);
  url.searchParams.set('gap', String(currentGap()));
  url.searchParams.set('stroke-weight', String(currentStrokeWeight()));
  // Subdivision density knobs apply in every mode.
  for (const [k, v] of Object.entries(currentSubdivisionParams())) {
    url.searchParams.set(k, String(v));
  }
  if (mode === 'triptych-variation') {
    const p = { ...currentVariationParams(), ...currentCoordinatedParams() };
    for (const [k, v] of Object.entries(p)) url.searchParams.set(k, String(v));
  }
  if (reuseSeed && state.seed != null) {
    url.searchParams.set('seed', String(state.seed));
  }
  const res = await fetch(url);
  if (v !== generateVersion) return;
  if (!res.ok) { showToast('generate failed: ' + res.status); return; }
  const data = await res.json();
  if (v !== generateVersion) return;
  state = { seed: data.seed, mode: data.mode };
  stage.innerHTML = data.svg;
  seedEl.textContent = `seed: ${data.seed} · mode: ${data.mode}`;
}

// Debounce for rapid input (holding an arrow key on a number field fires
// many change events). Debouncing collapses the burst into one request.
let debouncedGenerateTimer = null;
function debouncedGenerate() {
  clearTimeout(debouncedGenerateTimer);
  debouncedGenerateTimer = setTimeout(
    () => generate({ reuseSeed: true }),
    120,
  );
}

let view = { scale: 1, tx: 0, ty: 0 };
function applyView() {
  canvas.style.transform = `translate(${view.tx}px, ${view.ty}px) scale(${view.scale})`;
}
function resetView() {
  view = { scale: 1, tx: 0, ty: 0 };
  applyView();
}

viewport.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = viewport.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const factor = Math.exp(-e.deltaY * 0.002);
  const next = Math.min(40, Math.max(0.1, view.scale * factor));
  const ratio = next / view.scale;
  view.tx = x - (x - view.tx) * ratio;
  view.ty = y - (y - view.ty) * ratio;
  view.scale = next;
  applyView();
}, { passive: false });

let dragging = null;
viewport.addEventListener('pointerdown', (e) => {
  if (e.button !== 0) return;
  dragging = { x: e.clientX, y: e.clientY, tx: view.tx, ty: view.ty, pointerId: e.pointerId };
  viewport.setPointerCapture(e.pointerId);
  viewport.classList.add('panning');
});
viewport.addEventListener('pointermove', (e) => {
  if (!dragging) return;
  view.tx = dragging.tx + (e.clientX - dragging.x);
  view.ty = dragging.ty + (e.clientY - dragging.y);
  applyView();
});
function endDrag(e) {
  if (!dragging) return;
  try { viewport.releasePointerCapture(dragging.pointerId); } catch {}
  dragging = null;
  viewport.classList.remove('panning');
}
viewport.addEventListener('pointerup', endDrag);
viewport.addEventListener('pointercancel', endDrag);
viewport.addEventListener('dblclick', resetView);

async function save() {
  if (state.seed == null) return;
  const payload = { seed: state.seed, mode: state.mode,
                    gap: currentGap(), 'stroke-weight': currentStrokeWeight(),
                    ...currentSubdivisionParams() };
  if (state.mode === 'triptych-variation') {
    Object.assign(payload, currentVariationParams(), currentCoordinatedParams());
  }
  const res = await fetch('/save', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify(payload),
  });
  if (!res.ok) { showToast('save failed: ' + res.status); return; }
  const data = await res.json();
  showToast(`saved ${data.path}`);
}

let toastTimer = null;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1800);
}

document.getElementById('generate').addEventListener('click', () => generate());
document.getElementById('save').addEventListener('click', save);
document.getElementById('reset').addEventListener('click', resetView);
document.querySelectorAll('input[name=mode]').forEach((el) => {
  el.addEventListener('change', () => {
    syncVariationVisibility();
    generate({ reuseSeed: true });
  });
});
gapEl.addEventListener('change', () => generate({ reuseSeed: true }));
strokeWeightEl.addEventListener('change', debouncedGenerate);
strokeWeightEl.addEventListener('input', debouncedGenerate);
// Param inputs: debounce so holding an arrow key doesn't fire dozens of
// fetches (each of which would race on the server's global RNG).
[emptyWeightScaleEl, divisorBiasEl, cutDirectionBiasEl,
 mutationsEl, minDepthEl, maxDepthEl, minDimEl,
 coordinatedEl, circleCountEl, jitterAlongEl, jitterPerpEl,
 amplitudeEl, frequencyEl, showCurveEl].forEach((el) => {
  el.addEventListener('change', debouncedGenerate);
  el.addEventListener('input', debouncedGenerate);
});
syncVariationVisibility();

// -- views --

const views = {
  generate: document.getElementById('generate-view'),
  inspiration: document.getElementById('inspiration-view'),
};
let currentView = 'generate';

function setView(name) {
  currentView = name;
  for (const k of Object.keys(views)) views[k].hidden = (k !== name);
  document.querySelectorAll('.view-tabs button').forEach((b) => {
    b.classList.toggle('active', b.dataset.view === name);
  });
  if (name === 'inspiration' && inspirationImages == null) loadInspiration();
}

document.querySelectorAll('.view-tabs button').forEach((b) => {
  b.addEventListener('click', () => setView(b.dataset.view));
});

// -- inspiration gallery --

const gallery = document.getElementById('gallery');
const fs = document.getElementById('fullscreen');
const fsImg = document.getElementById('fullscreen-img');
const fsCaption = document.getElementById('fullscreen-caption');
let inspirationImages = null;
let fsIndex = -1;

async function loadInspiration() {
  const res = await fetch('/inspiration');
  if (!res.ok) { showToast('load failed: ' + res.status); return; }
  const data = await res.json();
  inspirationImages = data.images || [];
  gallery.innerHTML = '';
  inspirationImages.forEach((name, i) => {
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.innerHTML = `<img src="/inspiration/${encodeURIComponent(name)}" alt="${name}" loading="lazy">`;
    tile.addEventListener('click', () => openFullscreen(i));
    gallery.appendChild(tile);
  });
}

function openFullscreen(i) {
  if (!inspirationImages || inspirationImages.length === 0) return;
  fsIndex = ((i % inspirationImages.length) + inspirationImages.length) % inspirationImages.length;
  const name = inspirationImages[fsIndex];
  fsImg.src = `/inspiration/${encodeURIComponent(name)}`;
  fsCaption.textContent = `${name}  ·  ${fsIndex + 1}/${inspirationImages.length}`;
  fs.hidden = false;
}

function closeFullscreen() {
  fs.hidden = true;
  fsIndex = -1;
}

function nextImage(delta) {
  if (fsIndex < 0) return;
  openFullscreen(fsIndex + delta);
}

fs.addEventListener('click', (e) => {
  if (e.target === fs || e.target === fsImg) closeFullscreen();
});
fs.querySelector('.prev').addEventListener('click', (e) => { e.stopPropagation(); nextImage(-1); });
fs.querySelector('.next').addEventListener('click', (e) => { e.stopPropagation(); nextImage(1); });

// -- global keyboard --

document.addEventListener('keydown', (e) => {
  const tag = e.target.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  // Don't intercept when the user is holding a modifier -- those combos
  // (Cmd+R, Cmd+Shift+R, Cmd+S, etc.) belong to the browser.
  if (e.metaKey || e.ctrlKey || e.altKey) return;

  if (!fs.hidden) {
    if (e.key === 'Escape') { e.preventDefault(); closeFullscreen(); }
    else if (e.key === 'ArrowLeft') { e.preventDefault(); nextImage(-1); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); nextImage(1); }
    return;
  }

  if (currentView === 'generate') {
    if (e.key === 'Enter') { e.preventDefault(); generate(); }
    else if (e.key === 's' || e.key === 'S') { e.preventDefault(); save(); }
    else if (e.key === 'r' || e.key === 'R' || e.key === '0') { e.preventDefault(); resetView(); }
  } else if (currentView === 'inspiration') {
    if (e.key === 'ArrowLeft') { e.preventDefault(); nextImage(-1); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); nextImage(1); }
  }
});

generate();
</script>
</body>
</html>
